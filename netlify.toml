# Static HTML export (`next.config.ts` has `output: "export"` → publish `out/`).
# https://nextjs.org/docs/app/guides/static-exports

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

# Homepage HTML: 15 minute browser + shared CDN cache TTL (static export in `out/`).
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=900, s-maxage=900"
